services:
  - type: web
    name: efrog-api
    runtime: python
    buildCommand: apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: EFROG_MODEL_PATH
        value: ./frog_classifier3.onnx

      # Auth0
      - key: AUTH0_DOMAIN
        value: "dev-rbxcy3tqjhebw7aa.us.auth0.com"
      - key: AUTH0_AUDIENCE
        value: "https://efrog.onrender.com"          # e.g. https://efrog.onrender.com

      # Databricks
      - key: DATABRICKS_HOST
        value: "dbc-e930fe9b-24ee.cloud.databricks.com"          # e.g. adb-xxxx.azuredatabricks.net
      - key: DATABRICKS_HTTP_PATH
        value: "/sql/1.0/warehouses/3693794c981549b0"          # e.g. /sql/1.0/warehouses/xxxx
      - key: DATABRICKS_TOKEN
        sync: false        # secret — Render will prompt you to enter it in the dashboard
      - key: DATABRICKS_CATALOG
        value: ""          # leave empty to use hive_metastore
      - key: DATABRICKS_SCHEMA
        value: efrog
    plan: free
