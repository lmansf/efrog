services:
  - type: web
    name: efrog-api
    runtime: python
    buildCommand: apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 server:app
    envVars:
      - key: EFROG_MODEL_PATH
        value: ./frog_classifier.onnx

      # Auth0
      - key: AUTH0_DOMAIN
        value: "dev-rbxcy3tqjhebw7aa.us.auth0.com"
      - key: AUTH0_AUDIENCE
        value: "https://efrog.onrender.com"          # e.g. https://efrog.onrender.com

      # Supabase
      - key: SUPABASE_DB_URL
        sync: false        # secret — set in Render dashboard
                           # format: postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
    plan: free
